# docker-compose.yml
services:
  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama

  converter:
    build: .           # Dockerfile extending ghcr.io/ggerganov/llama.cpp.
    volumes:
      - ./models:/models
      - ./pipeline.py:/app/pipeline.py
    depends_on: [ollama]
    # command: python3 /app/pipeline.py # Command not needed since we specify it in the actual dockerfile.

volumes:
  ollama_data: